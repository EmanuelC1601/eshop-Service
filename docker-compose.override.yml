services:
    catalogdb:
        image: postgres:15
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: CatalogDb
        restart: always
        ports:
            - "5433:5432"
        volumes:
            - postgres_catalog:/var/lib/postgresql/data/

    catalog.api:
        build:
            context: .
            dockerfile: src/Catalog.API/Dockerfile
        environment:
            ASPNETCORE_ENVIRONMENT: Development  
            ConnectionStrings__Database: Host=catalogdb;Port=5432;Database=CatalogDb;Username=postgres;Password=postgres;
        ports:
            - "5000:8080" 
        depends_on:
            - catalogdb

    basketdb:
        image: postgres:15
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: BasketDb
        restart: always
        ports:
            - "5434:5432"
        volumes:
            - postgres_basket:/var/lib/postgresql/data/

    distributedcache:
        image: redis:7.4-alpine
        command: redis-server --appendonly yes --save 60 1
        restart: unless-stopped
        ports:
            - "6379:6379"
        volumes:
            - redis_data:/data
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 5s

    basket.api:
        build:
            context: .
            dockerfile: src/Basket.API/Dockerfile
        environment:
            ASPNETCORE_ENVIRONMENT: Development
            ConnectionStrings__Database: Host=basketdb;Port=5432;Database=BasketDb;Username=postgres;Password=postgres;
            ConnectionStrings__Redis: distributedcache:6379,abortConnect=false,connectRetry=3
        ports:
            - "5001:8080"
        depends_on:
            basketdb:
                condition: service_started
            distributedcache:
                condition: service_healthy

volumes:
    postgres_catalog:
    postgres_basket:
    redis_data:
