services:
  - type: web
    name: eshop-catalog-api
    runtime: docker
    plan: free
    dockerfilePath: ./src/Catalog.API/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:8080
      - key: ConnectionStrings__Database
        sync: false
      - key: Cors__AllowedOrigins__0
        sync: false

  - type: web
    name: eshop-basket-api
    runtime: docker
    plan: free
    dockerfilePath: ./src/Basket.API/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:8080
      - key: ConnectionStrings__Database
        sync: false
      - key: ConnectionStrings__Redis
        sync: false
      - key: Cors__AllowedOrigins__0
        sync: false
